name: Build & Deploy to DigitalOcean

on:
  push:
    branches: [main]

# Only one deploy runs at a time — cancels any in-progress deploy on new push
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. youruser/toolboxx

jobs:
  # ── 1. Build the Docker image on GitHub's free runners (7GB RAM) ──────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest   # GitHub gives you 7GB RAM here — plenty for Next.js
    permissions:
      contents: read
      packages: write        # needed to push to ghcr.io

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no setup needed

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx (enables layer caching)
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between builds — dramatically speeds up subsequent deploys
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # ── 2. Pull the pre-built image on your Droplet and restart ──────────────
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build    # only deploy if build succeeded

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}          # your Droplet IP
          username: deploy
          key: ${{ secrets.DO_SSH_KEY }}         # your private SSH key (PEM format)
          script: |
            set -e
            echo "📦 Pulling latest image..."

            # Log in to GitHub Container Registry on the Droplet
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the new image (already built on CI — no compilation here)
            docker pull ghcr.io/${{ github.repository }}:latest

            cd /home/deploy/app

            # Swap to the new image with zero downtime
            docker compose pull app
            docker compose up -d --no-deps --force-recreate app

            # Clean up old images to save disk space
            docker image prune -f

            echo "✅ Deploy complete"
            docker compose ps
