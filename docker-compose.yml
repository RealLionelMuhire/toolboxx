services:
  app:
    # On the Droplet we pull the pre-built image from GitHub Container Registry.
    # The build happens on GitHub Actions (7GB RAM) — never on the Droplet itself.
    # Replace YOUR_GITHUB_USERNAME/toolboxx with your actual repo path.
    image: ghcr.io/YOUR_GITHUB_USERNAME/toolboxx:latest

    # Keep the build section commented out so `docker compose up --build`
    # doesn't accidentally trigger a local compile on the Droplet.
    # Uncomment ONLY for local development builds:
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      # Memory cap: 1024 for 2GB Droplet, 512 for 1GB Droplet
      - NODE_MEM_LIMIT=${NODE_MEM_LIMIT:-1024}
      # Database
      - DATABASE_URI=${DATABASE_URI}
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      # App URLs
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_ROOT_DOMAIN=${NEXT_PUBLIC_ROOT_DOMAIN}
      - NEXT_PUBLIC_ENABLE_SUBDOMAIN_ROUTING=${NEXT_PUBLIC_ENABLE_SUBDOMAIN_ROUTING}
      # Stripe
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      # Cloudflare R2
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - NEXT_PUBLIC_R2_PUBLIC_URL=${NEXT_PUBLIC_R2_PUBLIC_URL}
      # Web Push
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_EMAIL=${VAPID_EMAIL}
      # SMTP
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      # Resend
      - RESEND_API_KEY=${RESEND_API_KEY}
      # Cron security
      - CRON_SECRET=${CRON_SECRET}
      # Set to 'true' only when debugging media upload/fetch issues
      - DEBUG_MEDIA=${DEBUG_MEDIA:-false}
    # Limit container memory so Docker kills & restarts the app
    # before the entire Droplet runs out of RAM
    mem_limit: 1200m        # Hard ceiling for 2GB Droplet
    memswap_limit: 1200m    # Disable swap for the container (OOM-kill is cleaner than swap thrash)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PORT:-3000}/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s     # Give Payload CMS time to init on first start
